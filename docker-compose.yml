services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments_engine
    ports:
      - "5433:5432"
    volumes:
      - payments_engine_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments_engine"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  payments_engine_pgdata:
